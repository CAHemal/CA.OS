<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CA.OS - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Figtree', 'Segoe UI', sans-serif;
      background: #F9FAFB;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: #4F46E5;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
    .icon span {
      color: white;
      font-weight: 700;
      font-size: 24px;
      font-family: 'Outfit', sans-serif;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      color: #18181B;
      margin-bottom: 8px;
    }
    p {
      color: #71717A;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    button {
      background: #4F46E5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338CA; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon"><span>CA</span></div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
